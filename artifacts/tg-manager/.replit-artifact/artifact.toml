kind = "web"
previewPath = "/"
title = "Telegram Account Manager"
version = "1.0.0"
id = "artifacts/tg-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24229

[services.development]
run = "pnpm --filter @workspace/tg-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tg-manager", "run", "build" ]
publicDir = "artifacts/tg-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24229"
BASE_PATH = "/"
